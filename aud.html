<html lang="ja">
<head>
    <meta charset="utf-8">
 
    <!-- StyleSheet -->
    <style>
        body,html{
            height: 100%;
            width: 100%;
            overflow: hidden;
      }
        #color_sample{
            display: inline-block;
            width: 50%;
            height: 30px;
            margin: 0 0 5vh 25%;
            background: rgb(0,0,0);
            border: solid 1px #111111;
        }
        
        label{
            margin: 0 0 5vh 25%;
        }
        
        input[type='range']{
            display: block;
            width: 80%;
            margin: 0 0 5vh 10%;
        }
        
        input[type='number']{
            display: block;
            width: 80%;
            margin: 0 0 5vh 10%;
        }
    </style>
</head>
<body>
    <!-- スライダー -->
    <label for="red">Red</label><input type="range" value="0" id="red" min="0" max="255" step="1" oninput="color_change_range()">
    <input type="number" value="0" min="0" max="255" id="red_num" oninput="color_change_num()">
    
    <label for="green">Green</label><input type="range" value="0" id="green" min="0" max="255" step="1" oninput="color_change_range()">
    <input type="number" value="0" min="0" max="255" id="green_num" oninput="color_change_num()">
    
    <label for="blue">Blue</label><input type="range" value="0" id="blue" min="0" max="255" step="1" oninput="color_change_range()">
    <input type="number" value="0" min="0" max="255" id="blue_num" oninput="color_change_num()">
  
    <!-- 色サンプル表示エリア -->
    <div id="color_sample"></div>
 
    <!-- JavaScript -->
    <script>
        // 色が変更された時に実行（スライダー）
        function color_change_range() {
 
            // 選択した色のRGBを取得
            var red = document.getElementById("red").value;
            var green = document.getElementById("green").value;
            var blue = document.getElementById("blue").value;
 
            // デバッグ用ログ
            console.log({red});
            console.log({green});
            console.log({blue});
 
            // サンプルの色を変更
            var sample_area = document.getElementById("color_sample");
            sample_area.style.backgroundColor = 'rgb(' + red + ',' + green + ',' + blue + ')';
          
            //numberに反映
            document.getElementById("red_num").value = red;
            document.getElementById("green_num").value = green;
            document.getElementById("blue_num").value = blue;
        }
        // 色が変更された時に実行（数値入力）
        function color_change_num() {
 
            // 選択した色のRGBを取得
            var red = document.getElementById("red_num").value;
            var green = document.getElementById("green_num").value;
            var blue = document.getElementById("blue_num").value;
 
            // デバッグ用ログ
            console.log({red});
            console.log({green});
            console.log({blue});
 
            // サンプルの色を変更
            var sample_area = document.getElementById("color_sample");
            sample_area.style.backgroundColor = 'rgb(' + red + ',' + green + ',' + blue + ')';
          
            //rangeに反映
            document.getElementById("red").value = red;
            document.getElementById("green").value = green;
            document.getElementById("blue").value = blue;
        }
  </script>
</body>
</html>
